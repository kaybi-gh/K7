name-template: 'K7 $RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-template: '$RESOLVED_VERSION'
change-template: '- $TITLE @$AUTHOR ([#$NUMBER]($URL))'

categories:
  - title: 'Breaking Changes'
    labels:
      - 'breaking-change'
  - title: 'Features'
    labels:
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'bug'
  - title: 'Documentation'
    labels:
      - 'documentation'
  - title: 'Miscellaneous'
    labels:
      - 'chore'

exclude-labels:
  - 'skip-changelog'

version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'chore'
      - 'documentation'

autolabeler:
  - label: 'breaking-change'
    title:
      - '/^.+!(\(.+\))?:/i'
    body:
      - '/BREAKING CHANGE:/i'
  - label: 'enhancement'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'bug'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'documentation'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^(chore|ci|build|refactor|perf|test)(\(.+\))?:/i'
