name: Label PR

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  autolabel:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      # Do not checkout PR head under pull_request_target (privileged token).
      # release-drafter and actions/labeler read config from the default branch.
      - name: Label from Conventional Commits (release-drafter)
        uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7 # v6
        with:
          disable-releaser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label from changed paths
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
