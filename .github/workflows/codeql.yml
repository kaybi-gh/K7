name: CodeQL

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - branding/**
      - screenshots/**
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - branding/**
      - screenshots/**
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          languages: csharp
          build-mode: manual

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Build for analysis
        run: |
          dotnet restore K7.CI.slnf
          dotnet build K7.CI.slnf --configuration Release --no-restore

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          category: "/language:csharp"
