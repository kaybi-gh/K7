name: Integration Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - branding/**
      - screenshots/**
      - LICENSE
      - .github/FUNDING.yml
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - branding/**
      - screenshots/**
      - LICENSE
      - .github/FUNDING.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout code

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: |
          dotnet restore tests/Application.FunctionalTests/Application.FunctionalTests.csproj
          dotnet restore tests/Infrastructure.IntegrationTests/Infrastructure.IntegrationTests.csproj

      - name: Build
        run: |
          dotnet build tests/Application.FunctionalTests/Application.FunctionalTests.csproj --configuration Release --no-restore
          dotnet build tests/Infrastructure.IntegrationTests/Infrastructure.IntegrationTests.csproj --configuration Release --no-restore

      - name: Test (functional)
        run: dotnet test tests/Application.FunctionalTests/Application.FunctionalTests.csproj --configuration Release --no-build --verbosity normal

      - name: Test (infrastructure)
        run: dotnet test tests/Infrastructure.IntegrationTests/Infrastructure.IntegrationTests.csproj --configuration Release --no-build --verbosity normal
