x-default-restart-security: &default-restart-security
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

volumes:
  k7-postgres-data:
  k7-data:
  movies:

services:
  postgres:
    <<: *default-restart-security
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    container_name: k7-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-K7}
    volumes:
      - k7-postgres-data:/var/lib/postgresql/data
    # Bind to loopback only - peers on the Docker network still reach postgres:5432.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  k7-server:
    <<: *default-restart-security
    container_name: k7-server
    # Published releases: ghcr.io/kaybi-gh/k7:latest (or a semver tag).
    # To build locally instead: docker build -t k7-server:latest . then set image: k7-server:latest
    image: ghcr.io/kaybi-gh/k7:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080/tcp"
    volumes:
      # Persist config keys, metadata artwork, logs, and transcoding cache across recreates.
      - k7-data:/data
      # Example library mount (Compose creates the named volume). For real media, prefer a bind mount:
      # - /path/to/movies:/media/movies:ro
      - movies:/media/movies:ro
    environment:
      Database__Provider: Postgres
      Database__UserID: ${POSTGRES_USER:-postgres}
      Database__Password: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      Database__Server: postgres
      Database__Port: "5432"
      Database__Name: ${POSTGRES_DB:-K7}
      Security__ApiKeys__HashSecret: ${SECURITY__APIKEYS__HASHSECRET:?Set SECURITY__APIKEYS__HASHSECRET in .env}
      Paths__Config: /data/config
      Paths__Metadatas: /data/metadatas
      Paths__Logs: /data/logs
      Paths__Transcoding: /data/transcoding
      PUID: ${PUID:-911}
      PGID: ${PGID:-911}
      # Sample stack is plain HTTP on :8080. Secure cookies (ForceHttps=true) break
      # antiforgery on /setup over HTTP. For a TLS reverse proxy, set true; private
      # Docker/LAN proxies are trusted by default - see docs/admin/configuration.md#reverse-proxy.
      Security__ForceHttps: ${SECURITY__FORCEHTTPS:-false}
      # Public URL of this instance (required for OIDC redirects and federation).
      # BaseUrl: https://k7.example.com
      # Optional display name used when inviting federation peers.
      # Server__Name: Home
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
