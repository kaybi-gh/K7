<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script>
        (function () {
            var ua = navigator.userAgent || '';
            var isTv = ua.indexOf('K7TV/') !== -1;
            var dpr = window.devicePixelRatio || 1;
            var rewrote = false;
            if (isTv) {
                document.documentElement.classList.add('platform-tv');
                // Compensate for the TV's high pixel density: rendering at
                // initial-scale = 1/dpr makes 1 CSS px == 1 physical px so
                // the UI is no longer zoomed in. We must drop maximum-scale
                // (and user-scalable=no) for some Android WebViews to honor
                // an initial-scale below 1.
                if (dpr > 1.05) {
                    var scale = 1 / dpr;
                    var meta = document.querySelector('meta[name="viewport"]');
                    var content = 'width=device-width, initial-scale=' + scale.toFixed(4) + ', viewport-fit=cover';
                    if (meta) {
                        meta.setAttribute('content', content);
                    } else {
                        meta = document.createElement('meta');
                        meta.name = 'viewport';
                        meta.content = content;
                        document.head.appendChild(meta);
                    }
                    rewrote = true;
                }
            }
            window.__k7TvDebug = {
                userAgent: ua,
                isTv: isTv,
                dpr: dpr,
                screenW: screen.width,
                screenH: screen.height,
                viewportRewritten: rewrote
            };
        })();
    </script>
    <title>K7</title>
    <base href="/" />

    <link rel="stylesheet" href="_content/K7.Clients.Shared.UI/app.css" />
    <link rel="stylesheet" href="K7.Clients.MAUI.styles.css" />

    <link rel="icon" type="image/svg+xml" href="_content/K7.Clients.Shared.UI/assets/favicon.svg" />

    <script src="_content/K7.Clients.Shared.UI/js/theme.js"></script>
</head>

<body>
    <div class="status-bar-safe-area"></div>
    <div id="app">
        <div id="preload">
            <div class="preload-content">
                <div id="preload-animation" class="preload-animation"></div>
            </div>
        </div>
    </div>


    <script src="_content/K7.Clients.Shared.UI/dist/lottie/build/player/lottie_light.min.js"></script>
    <script>
        if (window.lottie) {
            lottie.loadAnimation({
                container: document.getElementById('preload-animation'),
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: '_content/K7.Clients.Shared.UI/animations/splash.json'
            });
        }
    </script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/K7.Clients.Shared.UI/js/lottie-interop.js"></script>
    <script src="_content/K7.Clients.Shared.UI/dist/embla-carousel/embla-carousel.umd.js"></script>
    <script src="_content/K7.Clients.Shared.UI/lib/js-spatial-navigation/spatial_navigation.js"></script>
    <script src="_content/K7.Clients.Shared.UI/js/navigation.js"></script>
    <script src="_content/K7.Clients.Shared.UI/dist/qrcodejs/qrcode.min.js"></script>
    <script src="_content/K7.Clients.Shared.UI/js/qrcode.js"></script>
</body>

</html>
